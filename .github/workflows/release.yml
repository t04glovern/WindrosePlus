name: Release

# Triggered by pushing a version tag (v1.0.1, v1.1.0, etc.).
# Master commits alone do not build a release — only tagged versions do.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windrose-heal:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/windrose-heal -> target

      - name: Test windrose-heal
        run: cargo test --manifest-path tools/windrose-heal/Cargo.toml

      - name: Build windrose-heal
        run: cargo build --release --manifest-path tools/windrose-heal/Cargo.toml

      - name: Upload windrose-heal artifact
        uses: actions/upload-artifact@v4
        with:
          name: windrose-heal-windows
          path: tools/windrose-heal/target/release/windrose-heal.exe

  build-and-release:
    needs: build-windrose-heal
    runs-on: ubuntu-latest

    env:
      # Pinned tool versions. Bump here (and rerun the release tag) to upgrade.
      REPAK_VERSION: "0.2.3"
      RETOC_VERSION: "0.1.5"
      CPP_MOD_ASSET_TAG: "v1.0.10"
      HEIGHTMAP_EXPORTER_SHA256: "238fc6e44955d1467cf03d91897135a2bb17a6cfff7231ca3c14232357f77d54"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and verify repak
        working-directory: /tmp
        run: |
          ASSET="repak_cli-x86_64-pc-windows-msvc.zip"
          URL="https://github.com/trumank/repak/releases/download/v${REPAK_VERSION}/${ASSET}"
          curl -fsSL "$URL" -o "$ASSET"
          curl -fsSL "${URL}.sha256" -o "${ASSET}.sha256"
          sha256sum -c "${ASSET}.sha256"
          mkdir -p repak-extracted
          unzip -o "$ASSET" -d repak-extracted
          mkdir -p "$GITHUB_WORKSPACE/tools/bin"
          find repak-extracted -name 'repak.exe' -exec cp {} "$GITHUB_WORKSPACE/tools/bin/repak.exe" \;
          test -f "$GITHUB_WORKSPACE/tools/bin/repak.exe"

      - name: Download and verify retoc
        working-directory: /tmp
        run: |
          ASSET="retoc_cli-x86_64-pc-windows-msvc.zip"
          URL="https://github.com/trumank/retoc/releases/download/v${RETOC_VERSION}/${ASSET}"
          curl -fsSL "$URL" -o "$ASSET"
          curl -fsSL "${URL}.sha256" -o "${ASSET}.sha256"
          sha256sum -c "${ASSET}.sha256"
          mkdir -p retoc-extracted
          unzip -o "$ASSET" -d retoc-extracted
          find retoc-extracted -name 'retoc.exe' -exec cp {} "$GITHUB_WORKSPACE/tools/bin/retoc.exe" \;
          test -f "$GITHUB_WORKSPACE/tools/bin/retoc.exe"

      - name: Write tool VERSION and license files
        run: |
          {
            printf 'repak=%s\n' "$REPAK_VERSION"
            printf 'retoc=%s\n' "$RETOC_VERSION"
            printf 'built=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > tools/bin/VERSION.txt
          curl -fsSL "https://raw.githubusercontent.com/trumank/repak/v${REPAK_VERSION}/LICENSE-MIT"    -o tools/bin/LICENSE-repak-MIT.txt    || true
          curl -fsSL "https://raw.githubusercontent.com/trumank/repak/v${REPAK_VERSION}/LICENSE-APACHE" -o tools/bin/LICENSE-repak-APACHE.txt || true
          curl -fsSL "https://raw.githubusercontent.com/trumank/retoc/v${RETOC_VERSION}/LICENSE"        -o tools/bin/LICENSE-retoc.txt       || true

      - name: Fetch prebuilt C++ mod DLLs
        # C++ mods ship as source in-repo but build against the UE4SS SDK,
        # whose deps/first/Unreal submodule is a private fork of Unreal Engine
        # source gated behind Epic's licensed GitHub org — a public CI runner
        # can't clone it. Prebuilt DLLs are attached to GitHub releases as
        # standalone assets and fetched here. Asset tag and hashes are pinned
        # so release ZIP contents cannot change because "latest" moved or a
        # release asset was replaced.
        run: |
          mkdir -p cpp-mods/HeightmapExporter
          curl -fsSL "https://github.com/humangenome/WindrosePlus/releases/download/${CPP_MOD_ASSET_TAG}/HeightmapExporter.dll" \
            -o cpp-mods/HeightmapExporter/HeightmapExporter.dll
          echo "${HEIGHTMAP_EXPORTER_SHA256}  cpp-mods/HeightmapExporter/HeightmapExporter.dll" | sha256sum -c -

      - name: Download windrose-heal
        uses: actions/download-artifact@v4
        with:
          name: windrose-heal-windows
          path: tools/windrose-heal

      - name: Stamp release version into source
        # The Lua VERSION constant (reported by `wp.version` and stamped into
        # RCON status) and the start-script $Version banner are rewritten
        # here from the git tag so they cannot drift between releases. Any
        # literal in these two files is treated as a development placeholder.
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Stamping version $TAG"
          # Lua main.lua: VERSION = "X.Y.Z",
          sed -i -E 's/^(\s*VERSION\s*=\s*)"[^"]*"(,)$/\1"'"$TAG"'"\2/' WindrosePlus/Scripts/main.lua
          # PowerShell start script: $Version = "X.Y.Z"
          sed -i -E 's/^\$Version\s*=\s*"[^"]*"$/$Version = "'"$TAG"'"/' server/windrose_plus_server.ps1
          echo "--- main.lua VERSION line ---"
          grep -n 'VERSION = ' WindrosePlus/Scripts/main.lua | head -1
          echo "--- windrose_plus_server.ps1 \$Version line ---"
          grep -n '^\$Version = ' server/windrose_plus_server.ps1 | head -1
          # Hard-fail if either file did not end up with the expected tag,
          # so a future refactor that renames the constant is caught here
          # rather than shipping an incorrectly-stamped zip.
          grep -q "VERSION = \"$TAG\"" WindrosePlus/Scripts/main.lua
          grep -q "^\$Version = \"$TAG\"$" server/windrose_plus_server.ps1

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          NOTES_FILE="$(mktemp)"
          awk -v tag="$TAG" '
            $0 ~ "^## \\["tag"\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "No CHANGELOG section found for v$TAG" >&2
            exit 1
          fi
          {
            echo "Bug fix and improvement release."
            echo
            cat "$NOTES_FILE"
            echo
            echo "## Install / Upgrade"
            echo
            echo "Download \`WindrosePlus.zip\`, extract into your Windrose Dedicated Server folder, run \`install.ps1\`. Reinstalling is safe — your configs and custom mods are preserved. See [the installation guide](https://github.com/HumanGenome/WindrosePlus#installation) for details."
            echo
            echo "## Official Hosting"
            echo
            echo "Don't want to run your own server? [SurvivalServers.com](https://www.survivalservers.com/services/game_servers/windrose/?utm_source=github&utm_medium=release&utm_campaign=windrose_plus_v${TAG//./_}) offers Windrose servers with Windrose+ pre-installed."
          } > release_notes.md

      - name: Stage release tree
        run: |
          mkdir -p staging
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='CHANGELOG.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='staging' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='cpp-mods/RE-UE4SS' \
            --exclude='cpp-mods/build' \
            --exclude='tools/windrose-heal/target' \
            ./ staging/

      - name: Build zip
        working-directory: staging
        run: zip -r ../WindrosePlus.zip .

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Windrose+ $TAG" \
            --notes-file release_notes.md \
            WindrosePlus.zip \
            cpp-mods/HeightmapExporter/HeightmapExporter.dll
