; ============================================================
; WindrosePlus Server Configuration
; ============================================================
;
; All values shown are game defaults. Only changed values are
; patched — defaults are left alone.
;
; Copy this file to windrose_plus.ini and edit as needed.
;
; Additional config files (optional, copy .default.ini to .ini):
;   windrose_plus.weapons.ini   — Per-weapon damage and attack power
;   windrose_plus.food.ini      — Food, consumable, and alchemy stats
;   windrose_plus.entities.ini  — Land and naval entity stats (74 land + 18 naval)
;   windrose_plus.gear.ini      — Armor sets, jewelry, and set bonuses
; ============================================================

[Server]
; Server network and admin settings

; WindrosePlus HTTP API port
http_port = 8780
; Game port (auto-detected if blank)
game_port = 
; Path to server directory (auto-detected if blank)
server_dir = 

; Enable RCON remote console
rcon_enabled = false
; RCON password (leave blank to disable)
rcon_password = 

; Enable server query responses
query_enabled = true
; Query polling interval in milliseconds
query_interval_ms = 5000

; Admin Steam IDs (comma-separated)
admin_steam_ids = 

[Multipliers]
; Global server multipliers. 1.0 = default, 2.0 = double, 0.5 = half

; Loot/harvest drop quantity (harvest and loot are unified)
loot = 1
; Experience gain
xp = 1
; Item stack sizes
stack_size = 1
; Crafting efficiency. Higher = cheaper recipes (2.0 = half cost, 0.5 = double cost). Legacy key craft_cost still accepted.
craft_efficiency = 1
; Crop growth speed (2.0 = twice as fast)
crop_speed = 1
; Carry weight capacity
weight = 1

[PlayerStats]
; Player base attributes. Values are absolute, not multipliers.
; CurveTable: CT_CharactersAttributes

; Maximum health points
; Raw: Hero_MaxHealth
MaxHealth = 320
; Maximum stamina
; Raw: Hero_MaxStamina
MaxStamina = 150
; Stamina regeneration rate
; Raw: Hero_StaminaRegRate
StaminaRegRate = 40
; Maximum posture (stagger bar)
; Raw: Hero_MaxPosture
MaxPosture = 40
; Posture regeneration rate
; Raw: Hero_PostureRegRate
PostureRegRate = 20
; Base armor value
; Raw: Hero_Armor
Armor = 0
; Base defence power
; Raw: Hero_DefencePwr
DefencePwr = 90
; Stagger defence
